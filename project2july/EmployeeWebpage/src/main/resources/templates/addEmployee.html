<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<title>Add Employee</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-6">

				<div class="card shadow-sm">

					<div class="card-header">

						<h4>Add Employee</h4>

					</div>

					<div class="card-body">

						<form th:action="@{/save}" th:object="${employee}" method="post">

							<div class="mb-3">

								<label>Name</label>

								<input type="text" class="form-control" placeholder="Enter Name" th:field="*{name}">

								<div class="text-danger" th:errors="*{name}"></div>

							</div>

							<div class="mb-3">

								<label>Age</label>

								<input type="number" class="form-control" placeholder="Enter Age" th:field="*{age}">

								<div class="text-danger" th:errors="*{age}"></div>

							</div>

							

							<div class="mb-3">

								<label>Designation</label>

								<select class="form-select" th:field="*{designation}">

								    <option value="">Select Designation</option>

								    <option value="Programmer">Programmer</option>

								    <option value="Tester">Tester</option>

								    <option value="Manager">Manager</option>

								</select>

								<div class="text-danger" th:errors="*{designation}"></div>

								<div class="text-danger" th:errors="*{designation}"></div>

							</div>

							<button class="btn btn-primary">
								Save
							</button>

							<a href="/" class="btn btn-secondary">
								Home
							</a>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
